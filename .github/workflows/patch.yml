name: Patch Morphe (Python)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    permissions:
      contents: write
      actions: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Checkout
        uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4.3.0
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.14"

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25

      - name: Install Google Chrome
        run: |
          if command -v google-chrome-stable >/dev/null 2>&1; then
            echo "✅ Chrome zaten kurulu, adım atlanıyor: $(google-chrome-stable --version)"
          else
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --batch --yes --dearmor -o /usr/share/keyrings/google-chrome.gpg
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
            sudo apt-get update
            sudo apt-get install -y google-chrome-stable
          fi

      - name: Install & freeze Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --upgrade -r requirements.txt
          pip freeze > requirements-lock.txt

      - name: Fix nodriver non-UTF-8 source bug (upstream)
        run: |
          python3 - << 'PYEOF'
          import pathlib
          import site

          patched_any = False

          for base in site.getsitepackages():
              cdp_dir = pathlib.Path(base) / "nodriver" / "cdp"
              if not cdp_dir.exists():
                  continue
              for py_file in cdp_dir.glob("*.py"):
                  raw = py_file.read_bytes()
                  try:
                      raw.decode("utf-8")
                  except UnicodeDecodeError:
                      fixed = raw.decode("latin-1").encode("utf-8")
                      py_file.write_bytes(fixed)
                      print(f"Patched invalid UTF-8 bytes in: {py_file}")
                      patched_any = True

          if not patched_any:
              print("nodriver kaynak dosyalari zaten gecerli UTF-8, duzeltme gerekmedi.")
          PYEOF

      - name: Commit updated lockfile
        run: |
          if ! git diff --quiet -- requirements-lock.txt; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add requirements-lock.txt
            git commit -m "chore: update requirements-lock.txt [skip ci]"
            git push
          else
            echo "requirements-lock.txt değişmedi, commit atlanıyor."
          fi

      - name: Setup Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > Panemi.keystore

      - name: Run script
        run: python -u main.py
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          TARGET_APP: "all"
          KS_PATH: "Panemi.keystore"
          KS_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KS_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Yayın Onay Belgesini (Provenance) Üret
        if: ${{ hashFiles('*.apk') != '' }}
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: |
            *.apk
            !microg*.apk

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@b3018382ca039b53d238908238bd35d1fb14f8ee # v2.1.0
        with:
          retain_days: 0
          keep_minimum_runs: 1
