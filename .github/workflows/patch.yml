name: Morphe Patcher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Verify Java Version
        run: java -version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/keystore.keystore"
            echo "Keystore decoded to ${{ github.workspace }}/keystore.keystore"
          else
            echo "No KEYSTORE_BASE64 secret set; skipping keystore setup."
          fi

      - name: Connect to Tailscale (telefon üzerinden çık)
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          args: --exit-node=${{ secrets.TS_EXIT_NODE }} --exit-node-allow-lan-access=false
          ping: ${{ secrets.TS_EXIT_NODE }}

      - name: Verify exit IP
        run: |
          echo "Şu anki çıkış IP:"
          curl -s ifconfig.me
          echo ""

      - name: Run patcher
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          KS_PATH: ${{ github.workspace }}/keystore.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TARGET_APP: all
        run: python main.py
