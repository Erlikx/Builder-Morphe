name: 🚀 Automated APK Patching

on:
  workflow_dispatch: # Manuel tetikleme için
  schedule:
    - cron: '0 0 * * 0' # Her Pazar gece 00:00'da çalışır (UTC)

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Release oluşturmak için gerekli izin

    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 📦 Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🎭 Install Playwright Browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: 🔑 Setup Custom Keystore (Opsiyonel)
        if: env.KS_PATH != ''
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > ${{ env.KS_PATH }}
        env:
          KS_PATH: ${{ secrets.KS_PATH }}

      - name: 🛠️ Run Patcher
        run: python main.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          KS_PATH: ${{ secrets.KS_PATH }}
          KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
          KS_ALIAS: ${{ secrets.KS_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TARGET_APP: ${{ vars.TARGET_APP || 'all' }}
