# Patch Configuration for Python 3.14 & JDK Workspace
version: '2.0'
project:
  name: "python-jdk-app"
  target_environment: "python"
  python_version: "3.14.0"
  jdk_version: "24.0.0"
  build_tool: "pyproject"

python_modules:
  auto_update: true
  strategy: "latest"
  upgrade_on_build: true
  pip_args:
    - "--upgrade"
    - "--no-cache-dir"
  packages:
    - name: "requests"
      version: "2.32.3"
      latest: "2.32.3"
      auto_update: true
    - name: "fastapi"
      version: "0.115.6"
      latest: "0.115.6"
      auto_update: true
    - name: "pydantic"
      version: "2.10.4"
      latest: "2.10.4"
      auto_update: true
    - name: "numpy"
      version: "2.2.1"
      latest: "2.2.1"
      auto_update: true
    - name: "pandas"
      version: "2.2.3"
      latest: "2.2.3"
      auto_update: true
    - name: "py4j"
      version: "0.10.9.7"
      latest: "0.10.9.7"
      auto_update: true
      description: "Python-Java JDK Bridge"
    - name: "pyyaml"
      version: "6.0.2"
      latest: "6.0.2"
      auto_update: true
    - name: "uvicorn"
      version: "0.34.0"
      latest: "0.34.0"
      auto_update: true
    - name: "google-genai"
      version: "1.1.0"
      latest: "1.1.0"
      auto_update: true

jdk_configuration:
  enabled: true
  vendor: "OpenJDK"
  version: "24.0.0"
  java_home: "/usr/lib/jvm/java-24-openjdk"
  compiler_args:
    - "-source"
    - "24"
    - "-target"
    - "24"
  bridge: "Py4J"

patch_rules:
  - id: "rule-1"
    name: "Update Python Modules"
    action: "pip_upgrade_all"
    enabled: true
    schedule: "on_build"
  - id: "rule-2"
    name: "Sync patch.yml to requirements.txt"
    action: "export_requirements"
    enabled: true
    schedule: "on_change"
  - id: "rule-3"
    name: "JDK Py4J Gateway Initialization"
    action: "jdk_gateway_init"
    enabled: true
    schedule: "on_start"
