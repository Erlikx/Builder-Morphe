name: Morphe Patcher

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25 (Temurin LTS)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Verify Java Version
        run: java -version

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium

      - name: Set up Android SDK (apksigner)
        uses: android-actions/setup-android@v3

      - name: Install apksigner build-tools
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager --install "build-tools;35.0.0"
          BUILD_TOOLS_DIR="$ANDROID_HOME/build-tools/35.0.0"
          echo "APKSIGNER_PATH=$BUILD_TOOLS_DIR/apksigner" >> $GITHUB_ENV
          echo "$BUILD_TOOLS_DIR" >> $GITHUB_PATH

      - name: Decode keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 --decode > "${{ github.workspace }}/keystore.keystore"
            echo "Keystore decoded to ${{ github.workspace }}/keystore.keystore"
          else
            echo "No KEYSTORE_BASE64 secret set; skipping keystore setup."
          fi

      - name: Run patcher
        env:
          PYTHONUNBUFFERED: "1"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          KS_PATH: ${{ github.workspace }}/keystore.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          TARGET_APP: all
        run: python -u main.py

      - name: Upload debug HTML (on failure)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-html
          path: downloads/debug/
          if-no-files-found: ignore
          retention-days: 7

      - name: Persist known APK signatures
        if: always()
        run: |
          if [ -f known_signatures.json ] && [ -n "$(git status --porcelain known_signatures.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add known_signatures.json
            git commit -m "chore: update known APK signatures"
            git push
          else
            echo "No signature changes to commit."
          fi
