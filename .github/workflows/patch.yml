name: Builder Morphe Optimized Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'  # Her gece 03:00'te otomatik derleme

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Setup Java 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install Google Chrome & Dependencies
        run: |
          if ! command -v google-chrome-stable >/dev/null 2>&1; then
            wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo gpg --dearmor -o /usr/share/keyrings/google-chrome.gpg
            echo "deb [arch=amd64 signed-by=/usr/share/keyrings/google-chrome.gpg] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
            sudo apt-get update && sudo apt-get install -y google-chrome-stable
          fi

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install nodriver httpx websockets anyio

      - name: Run Builder Morphe Script
        env:
          KS_PATH: Panemi.keystore
          KS_PASSWORD: ${{ secrets.KS_PASSWORD }}
          KS_ALIAS: ${{ secrets.KS_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python -u main.py
